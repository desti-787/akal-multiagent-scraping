services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: akal_postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: akal_user
      POSTGRES_PASSWORD: akal_password
      POSTGRES_DB: akal_db
    ports:
      - "5544:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akal_user -d akal_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgis_data:
